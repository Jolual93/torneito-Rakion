<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakion — Amistoso</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove, get }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBoHEb9HiJ5X4Pi2nIq4CMXCoxjY3oT8AU",
    authDomain:        "rakion-amistoso.firebaseapp.com",
    databaseURL:       "https://rakion-amistoso-default-rtdb.firebaseio.com",
    projectId:         "rakion-amistoso",
    storageBucket:     "rakion-amistoso.firebasestorage.app",
    messagingSenderId: "514907137509",
    appId:             "1:514907137509:web:60816951e44f11170b7b0c"
  };

  const ADMIN_PASSWORD = "JOLUAL";

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const playersRef = ref(db, 'players');
  const sorteoRef  = ref(db, 'sorteo');
  const ipsRef     = ref(db, 'registered_ips');

  async function getMyIP() {
    try {
      const r = await fetch('https://api.ipify.org?format=json');
      const d = await r.json();
      return d.ip.replace(/\./g, '_').replace(/:/g, '_');
    } catch {
      return btoa(navigator.userAgent + navigator.language + screen.width)
        .replace(/[^a-zA-Z0-9]/g, '').slice(0, 32);
    }
  }

  let myIP        = null;
  let alreadyIn   = false;
  let playersList = {};
  let isAdmin     = false;

  // Verificar si ya era admin en esta sesión
  if (sessionStorage.getItem('rakion_admin') === ADMIN_PASSWORD) {
    isAdmin = true;
  }

  window.addEventListener('load', async () => {
    myIP = await getMyIP();

    updateAdminUI();

    const ipSnap = await get(ref(db, 'registered_ips/' + myIP));
    if (ipSnap.exists()) {
      alreadyIn = true;
      showAlreadyIn(ipSnap.val().name);
    }

    onValue(playersRef, snap => {
      playersList = snap.val() || {};
      renderPlayers(playersList);
    });

    onValue(sorteoRef, snap => {
      const s = snap.val();
      if (s && s.team1) {
        renderTeams(s.team1, s.team2, s.bench || []);
        document.getElementById('sorteoTs').textContent =
          'Sorteado: ' + new Date(s.ts).toLocaleTimeString('es-PE');
        document.getElementById('teamsContainer').style.display = 'block';
      } else {
        document.getElementById('teamsContainer').style.display = 'none';
      }
    });
  });

  // Login admin
  window.tryAdminLogin = function() {
    const input = document.getElementById('adminPassInput').value;
    const err   = document.getElementById('adminErr');
    if (input === ADMIN_PASSWORD) {
      isAdmin = true;
      sessionStorage.setItem('rakion_admin', ADMIN_PASSWORD);
      document.getElementById('adminLoginBox').style.display = 'none';
      updateAdminUI();
    } else {
      err.textContent = 'Contraseña incorrecta.';
      document.getElementById('adminPassInput').value = '';
    }
  };

  window.showAdminLogin = function() {
    const box = document.getElementById('adminLoginBox');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
    document.getElementById('adminErr').textContent = '';
  };

  window.adminLogout = function() {
    isAdmin = false;
    sessionStorage.removeItem('rakion_admin');
    updateAdminUI();
  };

  function updateAdminUI() {
    const adminPanel   = document.getElementById('adminPanel');
    const adminHint    = document.getElementById('adminHint');
    const adminBadge   = document.getElementById('adminBadge');

    if (isAdmin) {
      adminPanel.style.display  = 'block';
      adminHint.style.display   = 'none';
      adminBadge.style.display  = 'inline-flex';
    } else {
      adminPanel.style.display  = 'none';
      adminHint.style.display   = 'block';
      adminBadge.style.display  = 'none';
    }
    // actualizar botón sorteo también
    const arr = Object.values(playersList || {});
    const shuffleBtn = document.getElementById('shuffleBtn');
    if (shuffleBtn) shuffleBtn.disabled = !isAdmin || arr.length < 8;
  }

  window.addPlayer = async function() {
    if (alreadyIn) return;
    const name = document.getElementById('nameInput').value.trim();
    const cls  = document.getElementById('classSelect').value;
    const err  = document.getElementById('errorMsg');

    if (!name) { err.textContent = 'Escribe tu nombre primero.'; return; }
    if (!cls)  { err.textContent = 'Elige un personaje.'; return; }

    const existing = Object.values(playersList);
    if (existing.some(p => p.name.toLowerCase() === name.toLowerCase())) {
      err.textContent = 'Ese nombre ya está apuntado.'; return;
    }

    err.textContent = '';
    const newRef = push(playersRef);
    await set(newRef, { name, cls, ts: Date.now() });
    await set(ref(db, 'registered_ips/' + myIP), { name, ts: Date.now() });
    await set(sorteoRef, null);
    alreadyIn = true;
    showAlreadyIn(name);
  };

  window.removePlayer = async function(key) {
    if (!isAdmin) return;
    const p = playersList[key];
    if (!p) return;
    await remove(ref(db, 'players/' + key));
    const ipsSnap = await get(ipsRef);
    if (ipsSnap.exists()) {
      for (const [ip, val] of Object.entries(ipsSnap.val())) {
        if (val.name === p.name) {
          await remove(ref(db, 'registered_ips/' + ip));
          break;
        }
      }
    }
    await set(sorteoRef, null);
  };

  window.shuffle = async function() {
    if (!isAdmin) return;
    const arr = Object.entries(playersList).map(([k, v]) => ({ key: k, ...v }));
    if (arr.length < 8) return;
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    await set(sorteoRef, {
      team1: arr.slice(0, 4).map(p => ({ name: p.name, cls: p.cls })),
      team2: arr.slice(4, 8).map(p => ({ name: p.name, cls: p.cls })),
      bench: arr.slice(8).map(p => ({ name: p.name, cls: p.cls })),
      ts: Date.now()
    });
  };

  window.resetAll = async function() {
    if (!isAdmin) return;
    if (!confirm('¿Borrar a todos los jugadores y empezar de cero?')) return;
    await set(playersRef, null);
    await set(sorteoRef, null);
    await set(ipsRef, null);
    alreadyIn = false;
    document.getElementById('alreadyInBanner').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('errorMsg').textContent = '';
  };

  // Exponer renderPlayers al scope global para que updateAdminUI pueda leer playersList
  window._getPlayersList = () => playersList;
  window._isAdmin = () => isAdmin;

  // Parchear renderPlayers para que actualice el botón shuffle
  function renderPlayers(obj) {
    const entries = Object.entries(obj || {});
    document.getElementById('playerCount').textContent = entries.length;

    const shuffleBtn = document.getElementById('shuffleBtn');
    if (shuffleBtn) shuffleBtn.disabled = !isAdmin || entries.length < 8;

    const warn = document.getElementById('warningMsg');
    if (entries.length > 0 && entries.length < 8) {
      warn.style.display = 'block';
      warn.textContent = 'Faltan ' + (8 - entries.length) + ' jugador(es) más para el sorteo.';
    } else { warn.style.display = 'none'; }

    const list = document.getElementById('playersList');
    if (!entries.length) { list.innerHTML = '<div class="empty-msg">Nadie apuntado aún...</div>'; return; }
    entries.sort((a,b) => (a[1].ts||0)-(b[1].ts||0));
    list.innerHTML = entries.map(([key,p],i) =>
      '<div class="player-item">' +
        '<div class="player-num">'+(i+1)+'</div>' +
        '<div class="player-avatar '+CLASS_CSS[p.cls]+'">'+CLASS_ICONS[p.cls]+'</div>' +
        '<div class="player-name">'+escHtml(p.name)+'</div>' +
        '<div class="player-class">'+p.cls+'</div>' +
        (isAdmin ? '<button class="btn btn-danger" onclick="removePlayer(\''+escAttr(key)+'\')">✕</button>' : '') +
      '</div>'
    ).join('');
  }

  window.__renderPlayers = renderPlayers;
</script>

<style>
  :root {
    --gold: #c9a84c; --gold-light: #e8cc7a; --gold-dim: #7a6230;
    --red: #c0392b; --blue: #1a6fa0;
    --panel: #12121e; --border: rgba(201,168,76,0.25);
    --text: #e8dfc8; --muted: #7a7060;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; color:var(--text); font-family:'Crimson Pro',Georgia,serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: radial-gradient(1px 1px at 20% 30%,rgba(201,168,76,0.4) 0%,transparent 100%), radial-gradient(1px 1px at 60% 70%,rgba(201,168,76,0.3) 0%,transparent 100%), radial-gradient(1px 1px at 80% 20%,rgba(201,168,76,0.2) 0%,transparent 100%); pointer-events:none; z-index:0; }
  body::after { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; z-index:0; }

  .container { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:32px 20px 60px; }

  header { text-align:center; margin-bottom:40px; animation:fadeDown 0.6s ease both; }
  .logo-line { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:4px; }
  .logo-line::before,.logo-line::after { content:''; flex:1; height:1px; max-width:120px; background:linear-gradient(to right,transparent,var(--gold-dim)); }
  .logo-line::after { background:linear-gradient(to left,transparent,var(--gold-dim)); }
  .brand { font-family:'Cinzel Decorative',serif; font-size:clamp(28px,6vw,48px); font-weight:900; color:var(--gold); letter-spacing:4px; text-shadow:0 0 40px rgba(201,168,76,0.4),0 2px 4px rgba(0,0,0,0.8); }
  .subtitle { font-family:'Cinzel',serif; font-size:13px; letter-spacing:8px; color:var(--muted); text-transform:uppercase; margin-top:6px; }

  /* Admin badge en el header */
  .header-admin { display:flex; align-items:center; justify-content:center; gap:10px; margin-top:12px; }
  .admin-badge {
    display:none; align-items:center; gap:6px;
    background:rgba(201,168,76,0.12);
    border:1px solid rgba(201,168,76,0.35);
    border-radius:20px; padding:4px 12px 4px 8px;
    font-family:'Cinzel',serif; font-size:9px;
    letter-spacing:3px; color:var(--gold);
    text-transform:uppercase;
  }
  .admin-badge::before { content:'★'; font-size:11px; }
  .admin-logout {
    background:transparent; border:none; cursor:pointer;
    font-family:'Cinzel',serif; font-size:8px;
    letter-spacing:2px; color:var(--muted);
    text-transform:uppercase; padding:0 0 0 6px;
    border-left:1px solid rgba(201,168,76,0.2);
    margin-left:4px;
  }
  .admin-logout:hover { color:#e57368; }

  /* Admin hint (para usuarios normales) */
  .admin-hint {
    text-align:center; margin-top:10px;
    font-family:'Cinzel',serif; font-size:9px;
    letter-spacing:2px; color:var(--muted);
  }
  .admin-hint a { color:var(--gold-dim); cursor:pointer; text-decoration:none; border-bottom:1px dashed var(--gold-dim); }
  .admin-hint a:hover { color:var(--gold); }

  /* Login box admin */
  .admin-login-box {
    display:none;
    background:rgba(201,168,76,0.05);
    border:1px solid rgba(201,168,76,0.2);
    border-radius:4px; padding:16px 20px;
    margin-top:12px;
    animation:fadeUp 0.2s ease both;
  }
  .admin-login-row { display:flex; gap:10px; align-items:center; }
  .admin-pass-input {
    flex:1; background:rgba(255,255,255,0.04);
    border:1px solid var(--border); border-radius:3px;
    color:var(--text); font-family:'Crimson Pro',serif;
    font-size:16px; padding:8px 12px; outline:none;
    letter-spacing:4px;
    transition:border-color 0.2s;
  }
  .admin-pass-input:focus { border-color:var(--gold-dim); }
  .admin-err { color:#e57368; font-size:12px; font-style:italic; margin-top:6px; min-height:16px; }

  .panel { background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:28px; margin-bottom:24px; position:relative; animation:fadeUp 0.5s ease both; }
  .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); border-radius:4px 4px 0 0; }
  .panel-title { font-family:'Cinzel',serif; font-size:12px; letter-spacing:5px; text-transform:uppercase; color:var(--gold-dim); margin-bottom:20px; display:flex; align-items:center; gap:10px; }
  .panel-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .already-in { display:none; background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.3); border-radius:3px; padding:14px 18px; font-size:15px; color:var(--gold-light); font-style:italic; text-align:center; }

  .form-row { display:grid; grid-template-columns:1fr 1fr auto; gap:12px; align-items:end; }
  @media(max-width:560px){ .form-row{grid-template-columns:1fr;} }

  label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; display:block; margin-bottom:6px; }
  input[type="text"],select { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:3px; color:var(--text); font-family:'Crimson Pro',serif; font-size:16px; padding:10px 14px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; appearance:none; -webkit-appearance:none; }
  input[type="text"]:focus,select:focus { border-color:var(--gold-dim); box-shadow:0 0 0 3px rgba(201,168,76,0.1); }
  select option { background:#1a1a2e; }

  .btn { font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; border:none; border-radius:3px; cursor:pointer; padding:11px 22px; transition:all 0.2s; white-space:nowrap; }
  .btn-primary { background:linear-gradient(135deg,var(--gold-dim),var(--gold)); color:#0a0a0f; font-weight:700; }
  .btn-primary:hover { filter:brightness(1.15); transform:translateY(-1px); }
  .btn-sm { padding:8px 16px; font-size:10px; }
  .btn-danger { background:transparent; border:1px solid rgba(192,57,43,0.4); color:#e57368; font-size:10px; padding:4px 10px; letter-spacing:1px; }
  .btn-danger:hover { background:rgba(192,57,43,0.15); }
  .btn-shuffle { background:linear-gradient(135deg,#1a3a6a,#1a6fa0); color:#c8e4f8; border:1px solid rgba(26,111,160,0.5); font-size:13px; letter-spacing:2px; padding:13px 32px; }
  .btn-shuffle:hover:not(:disabled) { filter:brightness(1.2); transform:translateY(-1px); }
  .btn-shuffle:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
  .btn-reset { background:transparent; border:1px solid var(--border); color:var(--muted); font-size:10px; padding:8px 16px; }
  .btn-reset:hover { border-color:var(--gold-dim); color:var(--gold-dim); }

  /* Panel admin (solo visible si eres admin) */
  #adminPanel { display:none; }
  .admin-panel-inner {
    background:rgba(201,168,76,0.04);
    border:1px solid rgba(201,168,76,0.15);
    border-radius:3px; padding:16px 18px;
  }
  .admin-label {
    font-family:'Cinzel',serif; font-size:9px;
    letter-spacing:4px; color:var(--gold-dim);
    text-transform:uppercase; margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .admin-label::before { content:'★'; }
  .shuffle-controls { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }

  .live-dot { display:inline-flex; align-items:center; gap:6px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:#4caf76; text-transform:uppercase; margin-bottom:14px; }
  .live-dot::before { content:''; width:7px; height:7px; background:#4caf76; border-radius:50%; animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

  .player-count { font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px; color:var(--muted); margin-bottom:14px; }
  .player-count span { color:var(--gold); font-size:18px; font-weight:600; }
  .players-grid { display:flex; flex-direction:column; gap:6px; max-height:340px; overflow-y:auto; padding-right:4px; }
  .players-grid::-webkit-scrollbar { width:4px; }
  .players-grid::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:2px; }
  .player-item { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(201,168,76,0.1); border-radius:3px; padding:9px 14px; animation:slideIn 0.25s ease both; }
  .player-num { font-family:'Cinzel',serif; font-size:10px; color:var(--gold-dim); width:20px; text-align:center; flex-shrink:0; }
  .player-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; border:1px solid rgba(255,255,255,0.1); }
  .player-name { flex:1; font-size:17px; }
  .player-class { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .empty-msg { text-align:center; padding:32px 0; color:var(--muted); font-style:italic; font-size:15px; opacity:0.7; }
  .warning { background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.2); border-radius:3px; padding:10px 14px; font-size:14px; color:var(--gold-dim); margin-bottom:14px; font-style:italic; display:none; }
  .error-msg { color:#e57368; font-size:13px; font-style:italic; margin-top:8px; min-height:20px; }

  .teams-container { display:none; animation:fadeUp 0.4s ease both; margin-top:24px; }
  .vs-row { display:grid; grid-template-columns:1fr auto 1fr; gap:16px; align-items:stretch; }
  @media(max-width:560px){ .vs-row{grid-template-columns:1fr;} .vs-badge{display:none;} }
  .team-panel { border-radius:4px; padding:20px; position:relative; overflow:hidden; }
  .team1 { background:linear-gradient(135deg,rgba(192,57,43,0.12),rgba(192,57,43,0.04)); border:1px solid rgba(192,57,43,0.35); }
  .team1::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--red),transparent); }
  .team2 { background:linear-gradient(135deg,rgba(26,111,160,0.12),rgba(26,111,160,0.04)); border:1px solid rgba(26,111,160,0.35); }
  .team2::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--blue)); }
  .team-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:4px; text-transform:uppercase; margin-bottom:14px; }
  .team1 .team-label { color:#e57368; } .team2 .team-label { color:#5daee8; }
  .team-player { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .team-player:last-child { border-bottom:none; }
  .team-player-name { flex:1; font-size:17px; }
  .team-player-class { font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; color:var(--muted); }
  .vs-badge { display:flex; align-items:center; justify-content:center; font-family:'Cinzel Decorative',serif; font-size:22px; font-weight:900; color:var(--gold); text-shadow:0 0 20px rgba(201,168,76,0.5); letter-spacing:2px; }
  .bench-section { margin-top:16px; padding:14px; background:rgba(255,255,255,0.02); border:1px dashed rgba(255,255,255,0.1); border-radius:3px; }
  .bench-title { font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
  .bench-players { display:flex; flex-wrap:wrap; gap:8px; }
  .bench-chip { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:20px; padding:4px 10px 4px 6px; font-size:14px; }
  .bench-chip-class { font-family:'Cinzel',serif; font-size:8px; letter-spacing:1px; color:var(--muted); }
  .sorteo-ts { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--muted); margin-bottom:16px; font-style:italic; }

  .cls-mago       { background:rgba(140,60,200,0.25); }
  .cls-blacksmith { background:rgba(160,100,40,0.3); }
  .cls-ninja      { background:rgba(40,160,100,0.25); }
  .cls-guerrero   { background:rgba(200,60,60,0.25); }
  .cls-arquera    { background:rgba(60,120,200,0.25); }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(12px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes slideIn  { from{opacity:0;transform:translateX(-8px)}  to{opacity:1;transform:translateX(0)} }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-line"><div class="brand">RAKION</div></div>
    <div class="subtitle">Amistoso — Inscripción en vivo</div>
    <div class="header-admin">
      <div class="admin-badge" id="adminBadge">
        Admin
        <button class="admin-logout" onclick="adminLogout()">Salir</button>
      </div>
    </div>
    <div class="admin-hint" id="adminHint">
      <a onclick="showAdminLogin()">Acceso admin</a>
    </div>
    <div class="admin-login-box" id="adminLoginBox">
      <div class="admin-login-row">
        <input class="admin-pass-input" type="password" id="adminPassInput"
          placeholder="Contraseña" maxlength="30"
          onkeydown="if(event.key==='Enter') tryAdminLogin()">
        <button class="btn btn-primary btn-sm" onclick="tryAdminLogin()">Entrar</button>
      </div>
      <div class="admin-err" id="adminErr"></div>
    </div>
  </header>

  <!-- Inscripción -->
  <div class="panel" style="animation-delay:0.1s">
    <div class="panel-title">Inscripción</div>
    <div class="already-in" id="alreadyInBanner"></div>
    <div id="registerForm">
      <div class="form-row">
        <div>
          <label>Tu nombre</label>
          <input type="text" id="nameInput" placeholder="Ej: xXDarkBladexX" maxlength="24">
        </div>
        <div>
          <label>Personaje</label>
          <select id="classSelect">
            <option value="">— Elige personaje —</option>
            <option value="Mago">🔮 Mago</option>
            <option value="Blacksmith">🔨 Blacksmith</option>
            <option value="Ninja">🌿 Ninja</option>
            <option value="Guerrero">⚔️ Guerrero</option>
            <option value="Arquera">🏹 Arquera</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="addPlayer()">Apuntarme</button>
        </div>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <!-- Lista jugadores -->
  <div class="panel" style="animation-delay:0.2s">
    <div class="panel-title">Jugadores inscritos</div>
    <div class="live-dot">En vivo</div>
    <div class="player-count">Total: <span id="playerCount">0</span> jugadores</div>
    <div class="warning" id="warningMsg"></div>
    <div class="players-grid" id="playersList">
      <div class="empty-msg">Nadie apuntado aún...</div>
    </div>
  </div>

  <!-- Panel sorteo (solo admin lo ve) -->
  <div class="panel" id="adminPanel" style="animation-delay:0.3s">
    <div class="panel-title">Control de sala</div>
    <div class="admin-panel-inner">
      <div class="admin-label">Acciones de admin</div>
      <div class="shuffle-controls">
        <button class="btn btn-shuffle" id="shuffleBtn" onclick="shuffle()" disabled>
          🎲 Chocolatear equipos
        </button>
        <button class="btn btn-reset" onclick="resetAll()">Reiniciar todo</button>
      </div>
    </div>
  </div>

  <!-- Equipos -->
  <div class="teams-container" id="teamsContainer">
    <div class="panel">
      <div class="panel-title">Resultado del sorteo</div>
      <div class="live-dot">Resultado en vivo</div>
      <div class="sorteo-ts" id="sorteoTs"></div>
      <div class="vs-row">
        <div class="team-panel team1">
          <div class="team-label">⚔ Equipo 1</div>
          <div id="team1List"></div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-panel team2">
          <div class="team-label">🛡 Equipo 2</div>
          <div id="team2List"></div>
        </div>
      </div>
      <div class="bench-section" id="benchSection" style="display:none">
        <div class="bench-title">🪑 En la banca</div>
        <div class="bench-players" id="benchList"></div>
      </div>
    </div>
  </div>

</div>
<script>
  const CLASS_ICONS = {'Mago':'🔮','Blacksmith':'🔨','Ninja':'🌿','Guerrero':'⚔️','Arquera':'🏹'};
  const CLASS_CSS   = {'Mago':'cls-mago','Blacksmith':'cls-blacksmith','Ninja':'cls-ninja','Guerrero':'cls-guerrero','Arquera':'cls-arquera'};

  function showAlreadyIn(name) {
    document.getElementById('registerForm').style.display = 'none';
    const b = document.getElementById('alreadyInBanner');
    b.style.display = 'block';
    b.innerHTML = '✓ Ya estás apuntado como <strong>' + escHtml(name) + '</strong>. ¡Espera el sorteo!';
  }

  function renderTeams(t1,t2,bench) {
    document.getElementById('team1List').innerHTML = t1.map(tpHTML).join('');
    document.getElementById('team2List').innerHTML = t2.map(tpHTML).join('');
    const bs = document.getElementById('benchSection');
    if (bench && bench.length) {
      bs.style.display = 'block';
      document.getElementById('benchList').innerHTML = bench.map(p =>
        '<div class="bench-chip"><span>'+CLASS_ICONS[p.cls]+'</span><span>'+escHtml(p.name)+'</span><span class="bench-chip-class">'+p.cls+'</span></div>'
      ).join('');
    } else { bs.style.display = 'none'; }
  }

  function tpHTML(p) {
    return '<div class="team-player"><span style="font-size:18px">'+CLASS_ICONS[p.cls]+'</span><span class="team-player-name">'+escHtml(p.name)+'</span><span class="team-player-class">'+p.cls+'</span></div>';
  }

  function escHtml(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s)  { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

  // Exponer renderTeams para el módulo
  window.renderTeams = renderTeams;

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('nameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.addPlayer && addPlayer();
    });
  });
</script>
</body>
</html>
